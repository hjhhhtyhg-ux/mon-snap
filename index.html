<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NomCorse</title>
<style>
body { font-family:sans-serif; max-width:600px; margin:auto; padding:10px; background:#fefefe; }
header { background:#fffc00; padding:10px; border-radius:5px; margin-bottom:10px; text-align:center; font-weight:bold; font-size:24px; }
section { margin-bottom:10px; }
input, button { padding:10px; margin:5px; width:100%; border-radius:5px; border:1px solid #ccc; }
video { width:100%; height:300px; background:#000; border-radius:5px; margin-bottom:10px; }
.message { border:1px solid #ccc; padding:5px; margin:5px; border-radius:5px; }
#messages { max-height:300px; overflow-y:auto; }
</style>
</head>
<body>
<header>NomCorse</header>

<section>
<video id="video" autoplay></video>
</section>

<section>
<input id="msgInput" placeholder="Tape ton message ici"/>
<button id="sendBtn">Envoyer</button>
</section>

<section id="messages"></section>

<script>
// Caméra
navigator.mediaDevices.getUserMedia({video:true})
  .then(stream => { document.getElementById('video').srcObject = stream; })
  .catch(err => alert("Erreur caméra : " + err));

// Chat simple (local, messages visibles dans le même navigateur)
const messagesDiv = document.getElementById('messages');
const input = document.getElementById('msgInput');
document.getElementById('sendBtn').onclick = () => {
    const msg = input.value;
    if(msg.trim() === "") return;
    const div = document.createElement('div');
    div.className = 'message';
    div.innerText = 'Moi : ' + msg;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    input.value = '';
};
</script>
</body>
</html>
